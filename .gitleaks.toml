# gitleaks config (R8 — Layer 8 carry-forward).
#
# Extends the default ruleset with project-specific allowlist entries so
# legitimate keypair fixtures + .env.example placeholders don't trip
# the secret scanner.
#
# Default rules are inherited from gitleaks' built-in detectors:
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

title = "Areal Finance gitleaks config"

# Inherit the default ruleset (so we don't have to redefine every detector).
# The allowlist below ADDS to the default.
[extend]
useDefault = true

[allowlist]
description = "Project-wide allowlist for fixtures + documented placeholders"

# Paths that are safe to commit (test fixtures + documented examples).
paths = [
  # All `.env.example` files contain placeholder values that match secret
  # patterns by design (we don't want gitleaks to redact them).
  '''\.env\.example$''',
  # Vanity keypair JSON files for program addresses (5 contracts).
  # These are PUBLIC keypairs meant to be committed — they pin program
  # IDs across deployments and are validated against on-chain state.
  # SECRET keypairs (deployer, bot wallets) are gitignored separately.
  '''^keys/vanity/.*\.json$''',
  # Test fixtures — known hashes, mock signatures, etc.
  '''^bots/\.e2e/fixtures/''',
  # Bot mock keypairs used only for local-validator dress rehearsals.
  # Real production keys live in KMS (R6) and never touch the repo.
  '''^bots/merkle-publisher/local-mock-keypair\.json$''',
]

# Specific regex patterns to allow (e.g., placeholder bytes in source).
regexes = [
  # The R20 dev-placeholder mint vanity bytes embedded in
  # contracts/yield-distribution/src/constants.rs (and OT/native-dex
  # constants) — these are PUBLIC vanity addresses pinned at compile
  # time, replaced via scripts/migrate-mints.sh in R20 closure.
  '''dev-placeholder-mints''',
  # Known program IDs (5 vanity addresses) — public + immutable.
  '''oWnqbNwmEdjNS5KVbxz8xeuGNjKMd1aiNF89d7qdARL''',
  '''DEX8LmvJpjefPS1cGS9zWB9ybxN24vNjTTrusBeqyARL''',
  '''RWT9hgbjHQDj98xP7FYsT5QYp5X32XyK6QfMRmFtARL''',
  '''YLD9EBikcTmVCnVzdx6vuNajrDkp8tyCAgZrqTwmMXF''',
  '''FUTsbsdyJmEWa5LSYHWXMr9hQFyVsrJ1agGvRQGR1ARL''',
]

# Stop words — commits with these in the file path are scanned with
# extra rigor. Useful when reviewing changes to security-sensitive areas.
# (Empty for now — defaults are fine.)
stopwords = []

# Phase 20 — observability secrets
# These rules ADD to the inherited default ruleset (useDefault = true above)
# and target the secret formats introduced by the Phase 20 alerting +
# error-tracking integrations.
#
# Slack incoming-webhook URLs are NOT redefined here — gitleaks' default
# ruleset already ships a `slack-webhook-url` detector that catches the
# canonical 24-char form. Phase 21.5 W-20-01 dropped our local copy to
# avoid double-firing on the same finding (gitleaks does not de-duplicate
# across rule IDs).
[[rules]]
id = "telegram-bot-token"
description = "Telegram bot API token"
regex = '''[0-9]{8,10}:[A-Za-z0-9_-]{35}'''
tags = ["secret", "telegram"]

[[rules]]
id = "sentry-dsn-saas"
description = "Sentry SaaS DSN"
regex = '''https://[a-f0-9]{32}@(?:[a-z0-9-]+\.)?ingest\.(?:[a-z0-9-]+\.)?sentry\.io/[0-9]+'''
tags = ["secret", "sentry"]

[[rules]]
id = "sentry-dsn-self-host"
description = "Sentry self-hosted / GlitchTip DSN"
regex = '''https://[a-f0-9]{32}@[a-z0-9.-]+/[0-9]+'''
tags = ["secret", "sentry"]
