name: deploy-dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

concurrency:
  group: deploy-dashboard
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        uses: ./.github/actions/ssh-setup
        with:
          host: ${{ secrets.VPS_DEPLOYER_HOST }}
          key: ${{ secrets.VPS_DEPLOYER_KEY }}

      - name: Trigger deploy-dashboard
        env:
          DEPLOYER_USER: ${{ secrets.VPS_DEPLOYER_USER }}
          DEPLOYER_HOST: ${{ secrets.VPS_DEPLOYER_HOST }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              "${DEPLOYER_USER}@${DEPLOYER_HOST}" \
              deploy-dashboard

      - name: Health check (panel.areal.finance returns 200)
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://panel.areal.finance/)
            if [ "$code" = "200" ]; then
              echo "panel.areal.finance OK (HTTP $code)"
              exit 0
            fi
            echo "attempt $i: HTTP $code, retry in 6s"
            sleep 6
          done
          echo "panel.areal.finance failed health check"
          exit 1

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notify
        env:
          TOKEN: ${{ secrets.TELEGRAM_CI_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CI_CHAT_ID }}
          STATUS: ${{ needs.deploy.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ] || [ -z "${CHAT:-}" ]; then
            echo "Telegram secrets not configured — skipping notify."
            exit 0
          fi
          case "$STATUS" in
            success) ICON="OK" ;;
            skipped) ICON="SKIP" ;;
            *) ICON="FAIL" ;;
          esac
          TRIGGER="${COMMIT_MSG:-$EVENT}"
          MSG=$(printf '[%s] deploy-dashboard: %s\n%s\n%s' "$ICON" "$STATUS" "$TRIGGER" "$RUN_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${MSG}" \
            > /dev/null
