name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  submodules:
    name: Submodules resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - name: Show submodule status
        run: git submodule status
      - name: Show structure
        run: |
          echo "--- .gitmodules ---"
          cat .gitmodules
          echo ""
          echo "--- tree depth 2 ---"
          find . -maxdepth 2 -type d -not -path '*/\.*' | sort

  bots-shared-tests:
    # Phase 21.5 — gate every PR on `@areal/bots-shared` unit tests so the
    # hardening primitives (metrics, error-classify, locks, RPC pool) cannot
    # regress silently. This is a Phase 23 quality-gate prerequisite.
    name: bots/shared unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 22
      - name: Install bots workspace deps
        working-directory: bots
        run: npm install
      - name: Run @areal/bots-shared tests
        working-directory: bots
        run: npm -w @areal/bots-shared test
