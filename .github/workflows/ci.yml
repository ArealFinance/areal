name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  submodules:
    name: Submodules resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - name: Show submodule status
        run: git submodule status
      - name: Show structure
        run: |
          echo "--- .gitmodules ---"
          cat .gitmodules
          echo ""
          echo "--- tree depth 2 ---"
          find . -maxdepth 2 -type d -not -path '*/\.*' | sort
